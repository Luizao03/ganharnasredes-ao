<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Criar Conta - GanharNasRedes</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Google reCAPTCHA v2 -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <header class="top">
    <a href="index.html">← Voltar</a>
  </header>

  <main class="container">
    <h2>Criar Conta</h2>

    <div id="recaptcha-container"></div>

    <label>Nome de utilizador da plataforma</label>
    <input id="displayName" placeholder="teu nome de utilizador" type="text" required>

    <label>Número de telefone (sem +244)</label>
    <input id="phone" placeholder="923000000" type="tel" required>

    <button id="sendCode">Enviar código SMS</button>
  </main>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
